interface:
  display_name: "Styled Clothing Shoot"
  short_description: "Generate 20 e-commerce images per product in one of 7 preset styles"
  default_prompt: '使用 $styled-clothing-shoot：我会给你客户产品目录、模特参考图和风格选择（A-G，对应海边艺术、田园自然、都市松弛、现代科技、艺术建筑、室外街拍、大自然）。你要为当前产品一次性生成 20 个场景，并输出 20 张电商图。先读取产品目录下的配置.yaml 和对应风格参考图，优先使用其中指定的产品图、model_image 和定制要求生成 scenes.json，再逐张渲染最终电商图。优先按当前真实结构 `客户/{客户名}/{season}/{风格名}/{产品编码}/` 处理；如果遇到旧项目，再兼容 `产品 2` 结构。产品图直接在产品目录根部，不要再使用原图子文件夹。写 scenes.json 前必须先读 `references/style-definitions.md` 的总规则，再继续读对应风格的独立 markdown，按其中的场景家族、micro-location、避重骨架来设计，不要只靠一段简短风格描述。若是 `2026_春夏_第二批` 这类同季同风格批量任务，写当前款 scenes.json 前必须先查看最近 4-8 个兄弟 SKU 已完成的 batch，避开重复的场景骨架、微场景和道具组合。`scene_01 ~ scene_18` 必须写满 `pose / lighting / background / model_direction / color_tone` 这些结构字段，不能只剩 family、location 和 full_prompt。若风格是艺术建筑（E），必须先从 `style-e-architectural-editorial.md` 的 20 个具体建筑场景方案中选择 1 个，再围绕这个建筑世界完成 20 镜头；不要把美术馆、博物馆、庭院、台阶、暗廊、平墙等不同方案平均拼到同一款里，也不要让相邻 SKU 复用同一个方案编号。20 个场景默认按 10 张全身 + 10 张近景/局部组织，其中第 19 张是多角度细节拼图，第 20 张是正反面拼图。天气、鞋履和场景材质要跟随对应风格参考，不要套用单一外景模板。默认不要出现背景路人或人群；尤其室外街拍要优先选择少人、干净、低视觉噪音的精品门店外立面、安静街角、简洁橱窗和非高峰时段外摆，不要生成拥挤街道、杂乱招牌、车流和脏乱背景；街景要主动拉开咖啡馆、露天餐厅、漂亮建筑、街角、橱窗等差异；田园自然不要总是花房门口+花园小路+藤蔓墙，艺术建筑不要总是门洞+楼梯+长廊，大自然不要总是普通草地+普通稻田+压暗黄昏；海景不要只做空沙滩，要覆盖巴厘岛、海边餐厅、热带棕榈屋、海边艺术馆、礁石等场景；艺术馆和建筑场景要积极纳入；连衣裙/半裙/裤装要保留口袋并随机安排手插口袋镜头；所有服装默认有内衬且成片不透。若风格是大自然（G），必须避免任何明显背景虚化或奶油化假景深，必须有清晰日照和通透空气，禁止没有阳光的阴暗山野背景；优先选择芦苇荡、花海、草原坡地、高草草坡、湿地栈道、山野露台等更精致的自然环境，不要普通路边树林、普通公园草地或廉价旅游风景。'
