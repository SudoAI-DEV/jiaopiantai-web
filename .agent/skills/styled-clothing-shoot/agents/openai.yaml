interface:
  display_name: "Styled Clothing Shoot"
  short_description: "Generate 10 e-commerce images per product using one of 4 core scene categories"
  default_prompt: "使用 $styled-clothing-shoot：我会给你客户产品目录、模特参考图和场景选择（海边艺术 / 自然田园 / 艺术建筑 / 都市街拍）。你要为当前产品一次性生成 10 个场景，并输出 10 张电商图。先读取产品目录下的配置.yaml，优先使用其中的产品图、model_image、视觉分析文本和定制要求生成 scenes.json，再逐张渲染最终电商图。如果配置.yaml 已包含 image_descriptions 和 clothing_summary，直接消费文本，不再重新读取产品图片。优先按 `客户/{客户名}/{season}/{场景目录}/{产品编码}/` 结构处理。写 scenes.json 前必须先读 `references/scene-definitions.md` 和对应场景的独立 markdown。若是同季同场景批量任务，先查看最近 4-8 个兄弟 SKU 已完成的 batch 避重。10 个场景默认按 5 张全身 + 5 张近景/局部组织，第 9 张多角度细节拼图，第 10 张正反面拼图。"
