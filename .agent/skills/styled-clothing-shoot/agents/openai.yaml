interface:
  display_name: "Styled Clothing Shoot"
  short_description: "Generate 10 e-commerce images per product using one of 4 core scene categories"
  default_prompt: '使用 $styled-clothing-shoot：我会给你客户产品目录、模特参考图和场景选择（海边艺术 / 自然田园 / 艺术建筑 / 大自然）。你要为当前产品一次性生成 10 个场景，并输出 10 张电商图。先读取产品目录下的配置.yaml 和要求.yaml，优先使用其中指定的产品图、model_image 和定制要求生成 scenes.json，再逐张渲染最终电商图。优先按当前真实结构 `客户/{客户名}/{season}/{场景目录}/{产品编码}/` 处理；如果遇到旧项目，再兼容 `产品 2` 结构。产品图直接在产品目录根部，不要再使用原图子文件夹。写 scenes.json 前必须先读 `references/scene-definitions.md` 的总规则，再继续读对应场景的独立 markdown，按其中的场景家族、micro-location、避重骨架来设计，不要只靠一段简短场景描述。新的参考入口优先使用 `客户/{客户名}/场景/{场景名}/`；若当前产品目录仍叫 `田园自然`，在参考层默认映射到 `自然田园`；只有旧项目没有 `场景/` 时，才回退读取 `风格参考/`。若是 `2026_春夏_第二批` 这类同季同场景批量任务，写当前款 scenes.json 前必须先查看最近 4-8 个兄弟 SKU 已完成的 batch，避开重复的场景骨架、微场景和道具组合。`scene_01 ~ scene_08` 必须写满 `pose / lighting / background / model_direction / color_tone` 这些结构字段，不能只剩 family、location 和 full_prompt。若场景是艺术建筑，必须先从 `scene-e-architectural-editorial.md` 的 20 个具体建筑场景方案中选择 1 个，再围绕这个建筑世界完成 10 镜头；不要把美术馆、博物馆、庭院、台阶、暗廊、平墙等不同方案平均拼到同一款里，也不要让相邻 SKU 复用同一个方案编号。若场景是自然田园，必须先从 `scene-b-country-garden.md` 的 B01~B20 庄园场景方案里选 1 个主场景世界，再在同一庄园世界内部轮换 2-3 个连通 micro-location；不要总是花房门口+花园小路+藤蔓墙，要主动拉开庄园草坪、碎石庭院桌景、白纱门廊、花境小径、池塘草坪、果园/茶园边、石木院屋、黄车花园边、湖畔草坪等差异。若场景是大自然，必须避免任何明显背景虚化或奶油化假景深，必须有清晰日照和通透空气，禁止没有阳光的阴暗山野背景；优先选择芦苇荡、花海、草原坡地、高草草坡、湿地栈道、山野露台等更精致的自然环境，不要普通路边树林、普通公园草地或廉价旅游风景。海边艺术不要只做空沙滩，要覆盖巴厘岛、海边餐厅、热带棕榈屋、海边艺术馆、礁石等场景。10 个场景默认按 5 张全身 + 5 张近景/局部组织，其中第 9 张是多角度细节拼图，第 10 张是正反面拼图。默认不要出现背景路人或人群；连衣裙/半裙/裤装要保留口袋并随机安排手插口袋镜头；所有服装默认有内衬且成片不透。`
