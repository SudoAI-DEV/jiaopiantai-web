interface:
  display_name: "Organize Product Folders"
  short_description: "按产品2规范整理客户图片目录并生成配置.yaml（含视觉分析）"
  default_prompt: "使用 $organize-product-folders：把我给你的客户图片文件夹整理成"产品 2"结构，产品图片直接放在产品目录根部，不要再用原图子文件夹；同时为每个产品生成或更新 配置.yaml。配置.yaml 是唯一配置文件，负责 product_code / client / season / scene / folder_requirements / selected_images / model_image / custom_requirements / image_descriptions / clothing_summary，后续生成流程直接消费。"
